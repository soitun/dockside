user dockside;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
  worker_connections 768;
}

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  
  ssl_protocols TLSv1 TLSv1.1 TLSv1.2; # Dropping SSLv3, ref: POODLE
  ssl_prefer_server_ciphers on;
  
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;
  
  gzip on;
  # Compress the Vue client bundle, which App.pm serves at /assets/main.js and
  # /assets/main.css (application/javascript and text/css). nginx's built-in default
  # gzip_types is text/html only, so these types must be listed explicitly to be
  # compressed. gzip_vary adds 'Vary: Accept-Encoding' so a shared cache never serves the
  # gzipped variant to a client that did not request it (the assets are Cache-Control: public).
  gzip_types application/javascript text/javascript text/css;
  gzip_vary on;

  include /home/dockside/dockside/app/server/nginx/conf/sites-available/*;
}
